  openModal(isEdit ? '編輯班級' : '新增班級', bodyHtml);

  // 導師「移除」鈕：只清空欄位，實際刪除隨表單「儲存」一併送出（此表單本來就是固定 2 槽
  // 姓名/Email 輸入框，沒有獨立的逐筆刪除 API；confirm 後清空即等同準備移除該位導師）。
  if (tutors[0] && $('tutor1-remove')) {
    $('tutor1-remove').addEventListener('click', function () {
      if (!confirm('確定移除導師「' + tutors[0].name + '」？（需按下方「儲存」才會生效）')) return;
      $('tutor1-name').value = ''; $('tutor1-email').value = '';
      this.remove();
    });
  }
  if (tutors[1] && $('tutor2-remove')) {
    $('tutor2-remove').addEventListener('click', function () {
      if (!confirm('確定移除導師「' + tutors[1].name + '」？（需按下方「儲存」才會生效）')) return;
      $('tutor2-name').value = ''; $('tutor2-email').value = '';
      this.remove();
    });
  }

  // 新增時 id 隨系所/名稱即時衍生（撞名加序號後綴，同後端規則）；
  // 編輯時 id 固定（records 以 classId 關聯，不可改）。
  function refreshDerivedId() {
    if (isEdit) return;
    const name = $('class-name').value.trim();
    $('class-id').value = CLASS_NAME_RE.test(name) ? buildClassIdFront($('class-dept').value, name, bootstrapData.classes) : '';
  }
  refreshDerivedId();
  ['class-dept', 'class-name'].forEach(function (fid) {
    $(fid).addEventListener('input', refreshDerivedId);
    $(fid).addEventListener('change', refreshDerivedId);
  });

  $('class-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const name = $('class-name').value.trim();
    if (!CLASS_NAME_RE.test(name)) { showToast('班級名稱限 1–20 字（中英數字，不可含空白/符號）', 'error'); return; }
    const id = isEdit ? cls.id : buildClassIdFront($('class-dept').value, name, bootstrapData.classes);
    const newTutors = [];
    if ($('tutor1-name').value.trim() || $('tutor1-email').value.trim()) newTutors.push({ name: $('tutor1-name').value.trim(), email: $('tutor1-email').value.trim() });
    if ($('tutor2-name').value.trim() || $('tutor2-email').value.trim()) newTutors.push({ name: $('tutor2-name').value.trim(), email: $('tutor2-email').value.trim() });
    const displayName = $('class-display-name').value.trim();
    const overrideVal = $('class-required-override').value.trim();
    const gradVal = $('class-grad-grade').value.trim();
    const entry = {
      id: id, name: name, deptId: $('class-dept').value,
      systemId: $('class-system').value || null,
      displayName: displayName || undefined, // 空字串不覆寫，交由後端保留既有值或前端 fallback 顯示 name
      requiredMeetingOverride: overrideVal === '' ? null : Number(overrideVal),
      graduationGrade: gradVal === '' ? null : Number(gradVal),
      tutors: newTutors, dualApprovalMode: $('class-dual').value, active: $('class-active').checked,
    };
    const submitBtn = e.target.querySelector('button[type=submit]');
    try {
      await withBtnPending(submitBtn, async function () {
        const res = await proxyCall('adminUpsertClass', { class: entry });
        bootstrapData.classes = res.classes;
        showToast('已儲存', 'success');
        closeModal();
        renderNav();
        renderAdminClasses();
      });
    } catch (err) { showToast('儲存失敗：' + err.message, 'error'); }
  });
}

// ── 換學期帶入＋年級升級（Ticket D）──
// 管理員按鈕觸發 → adminRolloverPreview 產生規劃 → 預覽表逐列可修（動作/新班名）→
// 確認套用 adminRolloverApply（每列只送 classId/action/newName，其餘後端重算）。
const ROLLOVER_ACTION_LABELS = { advance: '帶入升級', graduate: '畢業', keep: '原樣保留' };
let rolloverRows = null; // 最近一次 preview 的 rows（套用時依 DOM 逐列讀回 admin 修改值）

function openRolloverModal() {
  rolloverRows = null;
  const semesters = (bootstrapData.semesters || []).slice().sort(function (a, b) { return String(a.id).localeCompare(String(b.id)); });
  if (semesters.length < 2) { showToast('至少需要兩個學期才能執行帶入', 'error'); return; }
  const currentId = bootstrapData.semester || semesters[semesters.length - 1].id;
  const curIdx = semesters.findIndex(function (s) { return s.id === currentId; });
  const defaultTo = curIdx !== -1 ? semesters[curIdx].id : semesters[semesters.length - 1].id;
  const defaultFrom = curIdx > 0 ? semesters[curIdx - 1].id : semesters[0].id;

  function semOptions(selectedId) {
    return semesters.map(function (s) {
      return '<option value="' + escapeHtml(s.id) + '"' + (s.id === selectedId ? ' selected' : '') + '>' + escapeHtml(s.label || s.id) + '</option>';
    }).join('');
  }

  openModal('帶入上學期名單（升級預覽）',
    '<p class="field-hint">升級只處理既有班級的改名與畢業；新一年級班級請用 Excel 匯入或手動新增。' +
    '同學年換學期（如 114-1→114-2）名單自動沿用，無需執行。</p>' +
    '<div class="row">' +
      '<div class="field"><label>來源學期</label><select id="roll-from">' + semOptions(defaultFrom) + '</select></div>' +
      '<div class="field"><label>目標學期</label><select id="roll-to">' + semOptions(defaultTo) + '</select></div>' +
    '</div>' +
    '<button type="button" class="btn btn-primary" id="roll-preview-btn">產生預覽</button>' +
    '<div id="roll-preview" style="margin-top:14px;"></div>',
    { wide: true });

  $('roll-preview-btn').addEventListener('click', async function () {
    const btn = this;
    try {
      await withBtnPending(btn, async function () {
        const res = await proxyCall('adminRolloverPreview', { fromSemester: $('roll-from').value, toSemester: $('roll-to').value });
        rolloverRows = (res && res.rows) || [];
        renderRolloverPreview();
      });
    } catch (err) { showToast('預覽失敗：' + err.message, 'error'); }
  });
}

function renderRolloverPreview() {
  const el = $('roll-preview');
  if (!el) return;
  if (!rolloverRows || !rolloverRows.length) { el.innerHTML = '<div class="empty-hint">沒有可處理的班級（停用/已刪除班級不納入）。</div>'; return; }
  el.innerHTML =
    '<div class="table-wrap"><table><thead><tr><th>系所</th><th>原班名</th><th>動作</th><th>新班名</th><th>導師</th><th>原因／提示</th></tr></thead><tbody>' +
    rolloverRows.map(function (r, i) {
      const actionSel = '<select data-roll-action="' + i + '">' +
        ['advance', 'graduate', 'keep'].map(function (a) {
          return '<option value="' + a + '"' + (a === r.action ? ' selected' : '') + '>' + ROLLOVER_ACTION_LABELS[a] + '</option>';
        }).join('') + '</select>';
      const nameInput = '<input type="text" data-roll-newname="' + i + '" maxlength="20" value="' + escapeHtml(r.newName || '') + '"' +
        (r.action === 'advance' ? '' : ' disabled') + ' style="min-width:110px;">';
      return '<tr' + (r.uncertain ? ' style="background:var(--color-warning-bg);"' : '') + '>' +
        '<td data-label="系所">' + escapeHtml(r.deptName) + '</td>' +
        '<td data-label="原班名">' + escapeHtml(r.displayName || r.name) + '</td>' +

    });
    const nAdv = rows.filter(function (r) { return r.action === 'advance'; }).length;

    if (!confirm('將改名 ' + nAdv + ' 班、畢業 ' + nGrad + ' 班，確定套用？（原樣保留 ' + (rows.length - nAdv - nGrad) + ' 班不變動）')) return;
    try {
      await withBtnPending(btn, async function () {
        const res = await proxyCall('adminRolloverApply', {
          fromSemester: $('roll-from').value, toSemester: $('roll-to').value, rows: rows,
        });
        bootstrapData.classes = res.classes;
        renderNav();
        const a = res.applied || {};
        let html = '<div class="empty-hint" style="color:var(--color-success);">套用完成：改名 ' + (a.advanced || 0) +
          ' 班、畢業 ' + (a.graduated || 0) + ' 班、原樣保留 ' + (a.kept || 0) + ' 班。</div>';
        if (res.errors && res.errors.length) {
          html += '<div class="empty-hint" style="color:var(--color-danger);">失敗 ' + res.errors.length + ' 列：</div><ul>' +
            res.errors.map(function (er) { return '<li>第 ' + (er.row + 1) + ' 列（' + escapeHtml(er.classId || '') + '）：' + escapeHtml(er.error) + '</li>'; }).join('') + '</ul>';
        }
        html += '<div class="modal-actions"><button type="button" class="btn" data-action="close-modal">關閉</button></div>';
        el.innerHTML = html;
        showToast('升級套用完成', res.errors && res.errors.length ? 'info' : 'success');
        if (adminTab === 'semesters') renderAdminSemesters();

}

// ── Excel 匯入導師名單 v3：格式自動偵測＋差異預覽核對（Ticket E）──
// 支援兩種格式：
//   標準範本——表頭：學院 / 系所 / 導師制度 / 班級名稱(原始) / 班級顯示名稱(可修改) /
//   應繳班會份數 / 導師1姓名 / 導師1email / 導師2姓名 / 導師2email（備註欄忽略）。
//   統計表——學諮中心「班級、家族會議記錄暨班級業務統計」：分頁=學院、表頭 row0~4、
//   資料自 row5，col0=系別(合併儲存格 forward-fill)、col2=班級、col3=導師姓名、col4=應開份數。
// 兩種格式解析後統一為相同中間格式 rows＋flags，共用 email 姓名比對與差異預覽；
// 確認匯入只送勾選列，沿用後端 adminImportRoster（fail-closed 驗證都在後端）。
let _sheetJsLoading = null;
function ensureSheetJsLoaded() {
  if (window.XLSX) return Promise.resolve();
  if (_sheetJsLoading) return _sheetJsLoading;
  _sheetJsLoading = new Promise(function (resolve, reject) {
    const s = document.createElement('script');
    s.src = 'https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js';
    s.onload = resolve;
    s.onerror = function () { reject(new Error('SheetJS 載入失敗，請確認網路連線')); };
    document.head.appendChild(s);
  });
  return _sheetJsLoading;
}

// __IMPORT_PARSER_START__
// 匯入解析器（純函式區）：test/import-parser.test.js 以本標記從 dev/index.html 抽取本區段，
// 在 node:vm 沙箱內單元測試（比照 test/harness.js 精神）。因此本區段**禁止**依賴
// DOM / bootstrapData / XLSX / escapeHtml 等外部符號——輸入一律由呼叫端整理好傳入。

// 與 CLASS_NAME_RE 同值（本區段須自足以便測試抽取；改動白名單時兩處同步）。
const IMPORT_CLASS_NAME_RE_ = /^[A-Za-z0-9一-鿿]{1,20}$/;

// 格式自動偵測：任一分頁 row2 col0==='系別' 且 row2 col2==='班級' → 統計表格式；否則標準範本。
// sheets = [{ name, rows }]，rows 為 sheet_to_json({header:1}) 的二維陣列。
function detectImportFormat(sheets) {
  const hit = (sheets || []).some(function (sh) {
    const r2 = (sh && sh.rows && sh.rows[2]) || [];
    return String(r2[0] == null ? '' : r2[0]).trim() === '系別' && String(r2[2] == null ? '' : r2[2]).trim() === '班級';
  });
  return hit ? 'stats' : 'standard';
}

function statsCell_(row, i) {
  const v = (row || [])[i];
  return String(v == null ? '' : v).trim();
}

// 特殊班名檢查：回 uncertain 原因字串或 null。
function statsClassNameIssue_(name) {
  if (name.indexOf('共同指導') !== -1) return '含「共同指導」，請人工確認';
  if (name === '家族') return '班名「家族」需展開為各導師一班，請人工確認';
  if (name.indexOf('海青') !== -1) return '海青班，請人工確認';
  if (!IMPORT_CLASS_NAME_RE_.test(name)) return '班名含空白/符號等非法字元，請修改';
  return null;
}

function addFlagReason_(flags, reason) {
  flags.uncertain = true;
  if (flags.reason && flags.reason.indexOf(reason) !== -1) return;  // 同一原因不重複累加（編輯後單列重跑 email 比對會再進來）
  flags.reason = flags.reason ? flags.reason + '；' + reason : reason;
}

// ── displayName 自動融合（前端複本）─────────────────────────────────────────
// 與 dev/Code.gs 的 deptShortName_ / fuseClassDisplayName_ 完全同邏輯（改動時兩處同步，
// 比照 IMPORT_CLASS_NAME_RE_ ↔ CLASS_NAME_RE 的先例；test/import-parser.test.js 另有
// parity 測試直接抽出 Code.gs 版本比對輸出，兩處漂移即紅燈）。
// 用途：匯入預覽對每列預填「簡稱」建議值（既有班級由呼叫端帶現行 displayName，不走此函式），
// 確認匯入送出的是使用者看到/修改過的值（後端 importRosterRow_ 本來就接受 classDisplayName）。
// 規則：系簡稱 = 系所名去尾字「系」；四技一A→「四+系簡+一A」、四技進一A→「進四+系簡+一A」、
// 碩一→「碩+系簡+一」、碩專一B→「碩專+系簡+一B」、博一→「博+系簡+一」、
// 家族→「系簡+家族(導師名)」（未帶導師名則不含括號）；技優/產訓/產專/海青前綴→前綴保留、
// 系簡插入其後；完全無法判別→「系簡+原名」。純字串規則，不查資料庫。
function deptShortNameFront(deptName) {
  const n = String(deptName || '').trim();
  return (n.length > 1 && n.slice(-1) === '系') ? n.slice(0, -1) : n;
}

function fuseClassDisplayNameFront(className, deptName, systemId, tutorName) {
  const name = String(className || '').trim();
  const short = deptShortNameFront(deptName);
  if (!name) return short;
  if (name.indexOf('家族') !== -1) {
    return tutorName ? (short + '家族(' + tutorName + ')') : (short + '家族');
  }
  if (name.indexOf('四技進') === 0) return '進四' + short + name.slice(3);
  if (name.indexOf('四技') === 0) return '四' + short + name.slice(2);
  if (name.indexOf('碩專') === 0) return '碩專' + short + name.slice(2);
  if (name.indexOf('碩') === 0) return '碩' + short + name.slice(1);
  if (name.indexOf('博') === 0) return '博' + short + name.slice(1);
  const otherPrefixes = ['技優', '產訓', '產專', '海青'];
  for (let i = 0; i < otherPrefixes.length; i++) {
    const p = otherPrefixes[i];
    if (name.indexOf(p) === 0) return p + short + name.slice(p.length);
  }
  return short + name;
}

// 統計表解析：輸出與標準範本相同的中間格式（requiredMeetingCount 空白＝undefined，
// 不是 null——後端「未帶＝保留既有覆寫」語意依賴這點）＋每列 flags {uncertain, reason, type}。
// 規則（依 114-2 實檔實測）：
// - 分頁 row0 col0=學院名；含「、」（如「獸醫學院、國際學院、達人學院」合併分頁）→
//   學院不明，整頁 collegeName 空、逐列標 uncertain。
// - col0 系別為合併儲存格 → forward-fill；「XX合計」「合計」列＝小計，跳過且不污染 forward-fill。
// - 班級空但有導師的列：col4 有值 → 家族導師（每人獨立一班，班名=「家族」+姓名*）；
//   col4 空 → 上一個班級列的導師2；上一列已有導師2 或找不到可併入列 → 標 uncertain。
//   *規格原訂「家族-姓名」，但 '-' 不在班名白名單（會被後端 fail-closed 拒絕），故直接相連。
// - 特殊班名（共同指導/家族/海青/非法字元）→ 標 uncertain（預覽中預設不勾、班名可改）。
function parseStatsWorkbook(sheets) {
  const out = [];
  (sheets || []).forEach(function (sh) {
    const rows = (sh && sh.rows) || [];
    const collegeRaw = statsCell_(rows[0], 0);
    const mergedCollege = collegeRaw.indexOf('、') !== -1;
    const collegeName = mergedCollege ? '' : collegeRaw;
    let currentDept = '';
    let lastClassRow = null; // 本分頁最近一個「一般班級」列（導師2併入目標）
    for (let i = 5; i < rows.length; i++) {
      const deptCell = statsCell_(rows[i], 0);
      const className = statsCell_(rows[i], 2);
      const tutor = statsCell_(rows[i], 3);
      const countCell = statsCell_(rows[i], 4);
      if (deptCell && /合計$/.test(deptCell)) continue;   // 小計列：跳過、不更新 currentDept
      if (deptCell) currentDept = deptCell;               // 系別合併儲存格 forward-fill
      if (!className && !tutor) continue;                 // 空列（含尾端大量空白列）
      // 全表統計列（實檔每分頁底部一列：導師欄=「264/341」之類的已開/應開比值）→ 跳過。
      if (tutor && /^[0-9][0-9\/.%]*$/.test(tutor)) continue;

      const flags = { uncertain: false, reason: null, type: null };
      if (mergedCollege) addFlagReason_(flags, '學院不明（合併分頁）');
      // 應開份數：空白=undefined（後端保留既有覆寫）；數字照帶；「實習」＝本學期免繳
      // （系統慣例 override 0，同班級表單「0＝本學期免繳，如實習」）但標 uncertain 供確認；
      // 其他非數字照帶原值並標 uncertain（勾選匯入會被後端擋下、逐列回報）。
      let countVal;
      if (countCell === '') {
        countVal = undefined;
      } else if (!isNaN(Number(countCell))) {
        countVal = Number(countCell);
      } else if (countCell === '實習') {
        countVal = 0;
        addFlagReason_(flags, '應開份數「實習」→ 視為免繳（0），請確認');
      } else {
        countVal = countCell;
        addFlagReason_(flags, '應開份數非數字（' + countCell + '），請確認');
      }
      const base = {
        collegeName: collegeName, deptName: currentDept, systemName: '',
        classNameRaw: className, classDisplayName: '',
        requiredMeetingCount: countVal,
        tutor1Name: tutor, tutor1Email: '', tutor2Name: '', tutor2Email: '',
        flags: flags,
      };

      if (!className && tutor) {
        if (countCell !== '') {
          // 家族導師：col4 有自己的應開份數 → 每人獨立一班
          base.classNameRaw = '家族' + tutor;
          flags.type = 'family';
          out.push(base);
        } else if (lastClassRow && lastClassRow.deptName === currentDept && !lastClassRow.tutor2Name) {
          lastClassRow.tutor2Name = tutor;   // 上一個班級列的導師2
        } else {
          addFlagReason_(flags, (lastClassRow && lastClassRow.deptName === currentDept)
            ? '第三位導師，請人工確認' : '找不到可併入的班級列，請人工確認');
          out.push(base);
        }
        continue;
      }

      // 一般班級列
      const issue = statsClassNameIssue_(className);
      if (issue) addFlagReason_(flags, issue);
      out.push(base);
      lastClassRow = base;
    }
  });
  return out;
}

// 從 classes（含墓碑——歷史班的導師 email 也是有效比對來源）的正式 tutors 建
// 「姓名 → email 陣列（去重）」對照表。只認正式 tutors，不採 suggestedTutors（未經確認）。
function buildTutorEmailIndex(classes) {
  const idx = {};
  (classes || []).forEach(function (c) {
    ((c && c.tutors) || []).forEach(function (t) {
      const name = String((t && t.name) || '').trim();
      const email = String((t && t.email) || '').trim().toLowerCase();
      if (!name || !email) return;
      if (!idx[name]) idx[name] = [];
      if (idx[name].indexOf(email) === -1) idx[name].push(email);
    });
  });
  return idx;
}

// email 姓名比對（兩種格式共用；僅在該列該導師 email 空白時）：
// 唯一命中 → 自動帶入（emailStatus 'auto'）；同名多 email → 留白、標 uncertain；
// 無命中 → 留白（'missing'，UI 標黃待補，不算 uncertain——匯入後可再於班級管理補上）。
function applyEmailLookup(rows, emailIndex) {
  (rows || []).forEach(function (r) {
    ['1', '2'].forEach(function (n) {
      const name = String(r['tutor' + n + 'Name'] || '').trim();
      if (!name || String(r['tutor' + n + 'Email'] || '').trim()) return;
      const hits = (emailIndex || {})[name] || [];
      if (hits.length === 1) {
        r['tutor' + n + 'Email'] = hits[0];
        r.flags['tutor' + n + 'EmailStatus'] = 'auto';
      } else if (hits.length > 1) {
        r.flags['tutor' + n + 'EmailStatus'] = 'ambiguous';
        addFlagReason_(r.flags, '「' + name + '」同名多 email，請確認');
      } else {
        r.flags['tutor' + n + 'EmailStatus'] = 'missing';
      }
    });
  });
  return rows;
}

// 差異比對（上傳前核對用）：以（系所名→現有系所、(deptId, 班名)→現有班級）比對現況。
// status：'new'（新班級）/ 'unchanged'（無變動，預設不勾）/ 'tutor_changed'（導師變更）/
// 'tutor2_added'（新增導師2）。導師比對以姓名為主；匯入列 email 空白時不比 email
// （統計表無 email 欄，自動帶入值本來就取自現況）。
function classifyImportRow(row, departments, classes) {
  const deptName = String(row.deptName || '').trim();
  const dept = (departments || []).filter(function (d) { return d && d.name === deptName; })[0];
  if (!dept) return { status: 'new', currentTutors: [] };
  const className = String(row.classNameRaw || '').trim();
  const cls = (classes || []).filter(function (c) { return c && c.deptId === dept.id && c.name === className; })[0];
  if (!cls) return { status: 'new', currentTutors: [] };
  const current = (cls.tutors || []).map(function (t) {
    return { name: String((t && t.name) || '').trim(), email: String((t && t.email) || '').trim().toLowerCase() };
  });
  const imported = [];
  if (String(row.tutor1Name || '').trim()) imported.push({ name: String(row.tutor1Name).trim(), email: String(row.tutor1Email || '').trim().toLowerCase() });
  if (String(row.tutor2Name || '').trim()) imported.push({ name: String(row.tutor2Name).trim(), email: String(row.tutor2Email || '').trim().toLowerCase() });
  if (!imported.length) return { status: 'unchanged', currentTutors: current };  // 本列未帶導師 → 後端沿用既有
  function sameTutor(cur, imp) { return cur && cur.name === imp.name && (!imp.email || cur.email === imp.email); }
  const identical = imported.length === current.length &&
    imported.every(function (t, i) { return sameTutor(current[i], t); });
  if (identical) return { status: 'unchanged', currentTutors: current };
  if (current.length === 1 && imported.length === 2 && sameTutor(current[0], imported[0])) {
    return { status: 'tutor2_added', currentTutors: current };
  }
  return { status: 'tutor_changed', currentTutors: current };
}
// __IMPORT_PARSER_END__

// 匯入預覽狀態——rosterRows 是單一事實來源：所有編輯值（班名/簡稱/導師/email/應繳/系所）、
// 勾選狀態（r.checked）、差異分類（r.diff）全存在列物件上；切學院分頁重繪 DOM 不會掉狀態，
// 「確認匯入」也一律從 rosterRows 讀值（跨所有分頁的勾選列都送），不讀 DOM。
let rosterRows = null;
let rosterTab = '';          // 當前學院分頁 key（=collegeName；'' 代表「未分學院」）
let rosterEmailIndex = null; // 姓名→email 對照（上傳解析時建立；編輯導師姓名後單列重跑比對用）

function renderAdminRoster() {
  $('admin-tab-content').innerHTML =
    '<div class="card"><h3>Excel 匯入導師名單</h3>' +
    '<p class="field-hint">支援兩種格式（自動偵測）：<b>標準範本</b>（學院／系所／導師制度／班級名稱(原始)／班級顯示名稱／' +
    '應繳班會份數／導師1姓名／導師1email／導師2姓名／導師2email）；或<b>統計表</b>（「班級、家族會議記錄暨班級業務統計」，' +
    '分頁＝學院、欄位＝系別/班級/導師姓名/應開份數）。統計表格式的家族導師會展開為每導師一班；' +
    'email 空白列匯入後導師無法核章，請儘速在班級管理補上。上傳後先產生差異預覽（仿統計表樣態：上方學院分頁、' +
    '分頁內依系所分組，欄位可像 Excel 儲存格直接修改），逐列核對勾選再確認匯入。</p>' +
    '<p class="field-hint">已畢業／已停用班級會被拒絕匯入（逐列錯誤顯示「class disabled: 班級ID」），這是設計如此、用來避免誤蓋畢業班資料。' +
    '若確實需要為該班補匯舊學期資料：先到「班級」頁籤編輯該班級、勾選「啟用」並儲存，重新執行本頁匯入；匯入完成後再回到該班編輯，' +
    '取消勾選「啟用」以還原停用／畢業狀態（此還原不影響已記錄的畢業學期）。</p>' +
    '<input type="file" id="roster-file" accept=".xlsx,.xls,.csv" />' +
    '<div id="roster-format" class="field-hint" style="margin-top:8px; font-weight:600;"></div>' +
    '<div id="roster-preview" style="margin-top:16px;"></div>' +
    '</div>';
  $('roster-file').addEventListener('change', onRosterFileChange);
}

async function onRosterFileChange(e) {
  const file = e.target.files[0];
  if (!file) return;
  $('roster-preview').innerHTML = '<div class="empty-hint">解析中…</div>';
  $('roster-format').textContent = '';
  try {
    await ensureSheetJsLoaded();
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const sheets = wb.SheetNames.map(function (n) {
      return { name: n, rows: XLSX.utils.sheet_to_json(wb.Sheets[n], { header: 1, defval: '' }) };
    });
    const format = detectImportFormat(sheets);
    $('roster-format').textContent = '偵測為：' + (format === 'stats' ? '統計表格式（班級、家族會議記錄暨班級業務統計）' : '標準範本格式');
    let rows;
    if (format === 'stats') {
      rows = parseStatsWorkbook(sheets);
    } else {
      const objRows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
      rows = objRows.map(function (row) {
        const countRaw = String(row['應繳班會份數'] != null ? row['應繳班會份數'] : '').trim();
        return {
          collegeName: String(row['學院'] || '').trim(),
          deptName: String(row['系所'] || '').trim(),
          systemName: String(row['導師制度'] || '').trim(),
          classNameRaw: String(row['班級名稱(原始)'] || row['班級名稱（原始）'] || '').trim(),
          classDisplayName: String(row['班級顯示名稱(可修改)'] || row['班級顯示名稱（可修改）'] || '').trim(),
          // 空白＝undefined（後端「未帶＝保留既有覆寫」），不是空字串/null
          requiredMeetingCount: countRaw === '' ? undefined : countRaw,
          tutor1Name: String(row['導師1姓名'] || '').trim(), tutor1Email: String(row['導師1email'] || '').trim(),
          tutor2Name: String(row['導師2姓名'] || '').trim(), tutor2Email: String(row['導師2email'] || '').trim(),
          flags: { uncertain: false, reason: null, type: null },
        };
      }).filter(function (r) { return r.deptName && r.classNameRaw; });
      rows.forEach(function (r) {
        if (!IMPORT_CLASS_NAME_RE_.test(r.classNameRaw)) addFlagReason_(r.flags, '班名含空白/符號等非法字元，請修改');
      });
    }
    rosterEmailIndex = buildTutorEmailIndex(bootstrapData.classes || []);
    applyEmailLookup(rows, rosterEmailIndex);
    rows.forEach(function (r) { r.diff = classifyImportRow(r, bootstrapData.departments || [], bootstrapData.classes || []); });
    // 預填「簡稱」（classDisplayName）：既有班級帶現行 displayName（送回同值＝不變更，
    // 不會覆蓋管理員自訂簡稱）；新班級用前端複本 fuseClassDisplayNameFront 預填融合建議值
    // （與後端 importRosterRow_ 建立新班時同規則）。確認匯入送出使用者看到/修改過的值。
    const deptByName = {};
    (bootstrapData.departments || []).forEach(function (d) { if (d && d.name) deptByName[d.name] = d; });
    rows.forEach(function (r) {
      if (String(r.classDisplayName || '').trim()) return;
      const dept = deptByName[String(r.deptName || '').trim()];
      const cls = dept ? (bootstrapData.classes || []).filter(function (c) {
        return c && c.deptId === dept.id && c.name === String(r.classNameRaw || '').trim();
      })[0] : null;
      r.classDisplayName = (cls && cls.displayName) ? cls.displayName
        : fuseClassDisplayNameFront(r.classNameRaw, r.deptName, null, String(r.tutor1Name || '').trim() || undefined);
    });
    // 勾選狀態存進列本身（切分頁重繪不掉）；無變動與待確認列預設不勾。
    rows.forEach(function (r) { r.checked = !(r.flags.uncertain || r.diff.status === 'unchanged'); });
    rosterRows = rows;
    rosterTab = rosterTabKeys()[0] || '';
    renderRosterPreview();
  } catch (err) {
    $('roster-preview').innerHTML = '<div class="empty-hint">解析失敗：' + escapeHtml(err.message) + '</div>';
  }
}

const IMPORT_DIFF_LABELS = { new: '新班級', unchanged: '無變動', tutor_changed: '導師變更', tutor2_added: '新增導師2' };
const IMPORT_DIFF_BADGE = { new: 'badge-approved', unchanged: 'badge-muted', tutor_changed: 'badge-pending_tutor', tutor2_added: 'badge-pending_tutor' };

function importTutorText(list) {
  return (list || []).map(function (t) { return t.name + (t.email ? '（' + t.email + '）' : ''); }).join('、') || '（無）';
}

// 學院分頁 key 集合：rosterRows 中 collegeName 的出現順序去重（'' = 未分學院，
// 對應統計表「獸醫學院、國際學院、達人學院」合併分頁等學院不明的列）。
function rosterTabKeys() {
  const keys = [];
  (rosterRows || []).forEach(function (r) {
    const k = String(r.collegeName || '').trim();
    if (keys.indexOf(k) === -1) keys.push(k);
  });
  return keys;
}
function rosterTabLabel(key) { return key === '' ? '未分學院' : key; }

// 全域摘要（跨所有分頁）；編輯後即時重算
function rosterSummaryText() {
  const counts = { new: 0, unchanged: 0, tutor_changed: 0, tutor2_added: 0, uncertain: 0 };
  rosterRows.forEach(function (r) {
    counts[r.diff.status]++;
    if (r.flags.uncertain) counts.uncertain++;
  });
  return '共 ' + rosterRows.length + ' 列：新班級 ' + counts.new + '、無變動 ' + counts.unchanged +
    '、導師變更 ' + counts.tutor_changed + '、新增導師2 ' + counts.tutor2_added +
    '、待人工確認（標黃）' + counts.uncertain + '。無變動與待確認列預設不勾選（統計含所有學院分頁）。';
}

function rosterStatusBadge(r) {
  return '<span class="badge ' + IMPORT_DIFF_BADGE[r.diff.status] + '">' + IMPORT_DIFF_LABELS[r.diff.status] + '</span>';
}

function rosterNotesText(r) {
  const notes = [];
  if (r.flags.reason) notes.push(r.flags.reason);
  if (r.diff.status === 'tutor_changed' || r.diff.status === 'tutor2_added') {
    const imp = [];
    if (String(r.tutor1Name || '').trim()) imp.push({ name: String(r.tutor1Name).trim(), email: r.tutor1Email });
    if (String(r.tutor2Name || '').trim()) imp.push({ name: String(r.tutor2Name).trim(), email: r.tutor2Email });
    notes.push('現行：' + importTutorText(r.diff.currentTutors) + ' → 匯入：' + importTutorText(imp));
  }
  return notes.join('；');
}

function rosterTextInput(i, field, value, extra) {
  return '<input type="text" data-roster-field="' + field + '" data-roster-i="' + i + '" value="' +
    escapeHtml(value == null ? '' : String(value)) + '"' + (extra || '') + '>';
}

// email 欄：一律 inline input（仿 Excel 儲存格）；missing/ambiguous 標黃、auto 附提示
function rosterEmailCellHtml(r, i, n) {
  const status = r.flags['tutor' + n + 'EmailStatus'];
  const warn = (status === 'missing' || status === 'ambiguous') && String(r['tutor' + n + 'Name'] || '').trim();
  return rosterTextInput(i, 'tutor' + n + 'Email', r['tutor' + n + 'Email'] || '',
      ' placeholder="待補 email"' + (warn ? ' class="roster-warn"' : '')) +
    (status === 'auto' ? '<div class="field-hint">依姓名自動帶入</div>' : '');
}

// 仿 Excel 統計表樣態：上方學院分頁（tabs），分頁內依系所分組（群組標題列仿系別合併儲存格），
// 班級列不重複學院/系所欄。全部渲染自 rosterRows（單一事實來源），切分頁只是重繪視圖。
function renderRosterPreview() {
  if (!rosterRows || !rosterRows.length) { $('roster-preview').innerHTML = '<div class="empty-hint">沒有可匯入的資料列。</div>'; return; }
  const keys = rosterTabKeys();
  if (keys.indexOf(rosterTab) === -1) rosterTab = keys[0];
  // 當前分頁的列（全域索引），依 deptName 首次出現順序分組
  const groupMap = {};
  const groups = [];
  rosterRows.forEach(function (r, i) {
    if (String(r.collegeName || '').trim() !== rosterTab) return;
    const d = String(r.deptName || '').trim();
    if (!groupMap[d]) { groupMap[d] = { dept: d, idx: [] }; groups.push(groupMap[d]); }
    groupMap[d].idx.push(i);
  });

  let html = '<p class="field-hint" id="roster-summary">' + escapeHtml(rosterSummaryText()) + '</p>' +
    '<div class="tab-bar">' + keys.map(function (k) {
      const n = rosterRows.filter(function (r) { return String(r.collegeName || '').trim() === k; }).length;
      return '<button type="button" class="tab-btn' + (k === rosterTab ? ' active' : '') + '" data-roster-tab="' + escapeHtml(k) + '">' +
        escapeHtml(rosterTabLabel(k)) + '（' + n + '）</button>';
    }).join('') + '</div>' +
    '<div style="display:flex; gap:8px; margin-bottom:8px; align-items:center; flex-wrap:wrap;">' +
      '<button type="button" class="btn btn-sm" data-roster-select="all">全選</button>' +
      '<button type="button" class="btn btn-sm" data-roster-select="none">全不選</button>' +
      '<button type="button" class="btn btn-sm" data-roster-select="changed">只選有變動</button>' +
      '<span class="field-hint" style="margin:0;">（只作用於「' + escapeHtml(rosterTabLabel(rosterTab)) + '」分頁）</span>' +
    '</div>' +
    '<div class="table-wrap"><table id="roster-preview-table"><thead><tr><th></th><th>班級名稱(原始)</th><th>簡稱</th>' +
    '<th>導師1</th><th>Email1</th><th>導師2</th><th>Email2</th><th>應繳</th><th>狀態</th><th>原因／提示</th></tr></thead><tbody>';

  groups.forEach(function (g) {
    // 系所群組標題列（仿 Excel 系別合併儲存格）：系所名可修，套用到本群組所有列
    html += '<tr class="roster-dept-head"><td colspan="10">系所：' +
      '<input type="text" data-roster-dept="' + g.idx.join(',') + '" value="' + escapeHtml(g.dept) + '">' +
      '<span class="field-hint" style="display:inline; margin-left:8px;">（修改套用到本群組 ' + g.idx.length + ' 列）</span></td></tr>';
    g.idx.forEach(function (i) {
      const r = rosterRows[i];
      html += '<tr data-roster-row="' + i + '"' + (r.flags.uncertain ? ' style="background:var(--color-warning-bg);"' : '') + '>' +
        '<td><input type="checkbox" data-roster-check="' + i + '"' + (r.checked ? ' checked' : '') + '></td>' +
        '<td data-label="班級名稱(原始)">' + rosterTextInput(i, 'classNameRaw', r.classNameRaw, ' maxlength="20"') +
          (r.flags.type === 'family' ? ' <span class="badge badge-type">家族</span>' : '') + '</td>' +
        '<td data-label="簡稱">' + rosterTextInput(i, 'classDisplayName', r.classDisplayName) + '</td>' +
        '<td data-label="導師1">' + rosterTextInput(i, 'tutor1Name', r.tutor1Name) + '</td>' +
        '<td data-label="Email1" data-roster-email-cell="' + i + ':1">' + rosterEmailCellHtml(r, i, '1') + '</td>' +
        '<td data-label="導師2">' + rosterTextInput(i, 'tutor2Name', r.tutor2Name) + '</td>' +
        '<td data-label="Email2" data-roster-email-cell="' + i + ':2">' + rosterEmailCellHtml(r, i, '2') + '</td>' +
        '<td data-label="應繳">' + rosterTextInput(i, 'requiredMeetingCount',
          r.requiredMeetingCount === undefined ? '' : String(r.requiredMeetingCount), ' placeholder="制度預設"') + '</td>' +
        '<td data-label="狀態" data-roster-status="' + i + '">' + rosterStatusBadge(r) + '</td>' +
        '<td data-label="原因／提示" data-roster-notes="' + i + '" class="roster-notes">' + escapeHtml(rosterNotesText(r)) + '</td></tr>';
    });
  });

  html += '</tbody></table></div>' +
    '<p class="field-hint">勾選＝確認匯入該列；欄位可直接修改（仿 Excel 儲存格），修改即時保存並重算差異，切換學院分頁不會遺失。' +
    '標黃列請確認班名/導師後再勾選。確認匯入後由後端逐列驗證與寫入，單列失敗不影響其他列。</p>' +
    '<button class="btn btn-primary" data-action="roster-confirm" style="margin-top:10px;">確認匯入勾選列（含所有學院分頁）</button>';
  $('roster-preview').innerHTML = html;
}

// 單列差異重算＋DOM 局部更新（badge/提示欄），不整表重繪（避免打斷正在輸入的 input）
function refreshRosterRowDiff(i) {
  const r = rosterRows[i];
  r.diff = classifyImportRow(r, bootstrapData.departments || [], bootstrapData.classes || []);
  const st = document.querySelector('[data-roster-status="' + i + '"]');
  if (st) st.innerHTML = rosterStatusBadge(r);
  const nt = document.querySelector('[data-roster-notes="' + i + '"]');
  if (nt) nt.textContent = rosterNotesText(r);
}
function refreshRosterSummary() {
  const el = $('roster-summary');
  if (el && rosterRows && rosterRows.length) el.textContent = rosterSummaryText();
}

// 分頁切換／勾選範圍按鈕（作用於當前分頁）——狀態一律寫回 rosterRows
document.body.addEventListener('click', function (e) {
  const tabBtn = e.target.closest('[data-roster-tab]');
  if (tabBtn && rosterRows) { rosterTab = tabBtn.dataset.rosterTab; renderRosterPreview(); return; }
  const selBtn = e.target.closest('[data-roster-select]');
  if (selBtn && rosterRows) {
    const mode = selBtn.dataset.rosterSelect;
    rosterRows.forEach(function (r, i) {
      if (String(r.collegeName || '').trim() !== rosterTab) return;  // 只作用於當前分頁
      r.checked = mode === 'all' ? true : (mode === 'none' ? false : (r.diff.status !== 'unchanged' && !r.flags.uncertain));
      const cb = document.querySelector('[data-roster-check="' + i + '"]');
      if (cb) cb.checked = r.checked;
    });
  }
});

document.body.addEventListener('change', function (e) {
  const cb = e.target.closest('[data-roster-check]');
  if (cb && rosterRows) rosterRows[Number(cb.dataset.rosterCheck)].checked = cb.checked;
});

// inline 編輯：input 事件即時寫回 rosterRows[i]，並依欄位重跑 email 比對／差異分類
document.body.addEventListener('input', function (e) {
  if (!rosterRows) return;
  const deptInput = e.target.closest('[data-roster-dept]');
  if (deptInput) {
    // 系所群組標題列：改一次套用到本群組所有列，並逐列重算差異
    deptInput.dataset.rosterDept.split(',').forEach(function (s) {
      const i = Number(s);
      rosterRows[i].deptName = deptInput.value;
      refreshRosterRowDiff(i);
    });
    refreshRosterSummary();
    return;
  }
  const inp = e.target.closest('[data-roster-field]');
  if (!inp) return;
  const i = Number(inp.dataset.rosterI);
  const field = inp.dataset.rosterField;
  const r = rosterRows[i];
  if (field === 'requiredMeetingCount') {
    // 語意同解析：留空＝undefined（後端保留既有覆寫）、數字照帶、非數字照帶原值（後端逐列擋）
    const v = inp.value.trim();
    r.requiredMeetingCount = v === '' ? undefined : (isNaN(Number(v)) ? v : Number(v));
    return; // 應繳不影響差異分類
  }
  r[field] = inp.value;
  if (field === 'tutor1Name' || field === 'tutor2Name') {
    const n = field === 'tutor1Name' ? '1' : '2';
    // 先前「依姓名自動帶入」的 email 是舊姓名的比對結果 → 清掉重比；使用者手填/檔案原有值不動
    if (r.flags['tutor' + n + 'EmailStatus'] === 'auto') r['tutor' + n + 'Email'] = '';
    if (!String(r['tutor' + n + 'Email'] || '').trim()) {
      delete r.flags['tutor' + n + 'EmailStatus'];
      applyEmailLookup([r], rosterEmailIndex || {});
      const cell = document.querySelector('[data-roster-email-cell="' + i + ':' + n + '"]');
      if (cell) cell.innerHTML = rosterEmailCellHtml(r, i, n);
    }
  }
  if (field !== 'classDisplayName') {  // 簡稱不影響差異分類
    refreshRosterRowDiff(i);
    refreshRosterSummary();
  }
});

document.body.addEventListener('click', async function (e) {
  const btn = e.target.closest('[data-action="roster-confirm"]');
  if (!btn || !rosterRows || !rosterRows.length) return;
  // 從 rosterRows 讀值（跨所有分頁的勾選列都送，不讀 DOM）；送出前跨分頁驗班名
  const selected = [];
  const bad = [];  // { i, college }
  rosterRows.forEach(function (r, i) {
    if (!r.checked) return;
    const className = String(r.classNameRaw || '').trim();
    if (!CLASS_NAME_RE.test(className)) { bad.push({ i: i, college: String(r.collegeName || '').trim() }); return; }
    selected.push({
      collegeName: String(r.collegeName || '').trim(), deptName: String(r.deptName || '').trim(),
      systemName: r.systemName,
      classNameRaw: className, classDisplayName: String(r.classDisplayName || '').trim(),
      requiredMeetingCount: r.requiredMeetingCount,  // undefined＝未帶（保留既有覆寫）
      tutor1Name: String(r.tutor1Name || '').trim(), tutor1Email: String(r.tutor1Email || '').trim().toLowerCase(),
      tutor2Name: String(r.tutor2Name || '').trim(), tutor2Email: String(r.tutor2Email || '').trim().toLowerCase(),
    });
  });
  if (bad.length) {
    // toast 帶各學院不合法列數；自動切到第一個含不合法列的分頁並標紅
    const byCollege = {};
    const order = [];
    bad.forEach(function (b) {
      if (!(b.college in byCollege)) { byCollege[b.college] = 0; order.push(b.college); }
      byCollege[b.college]++;
    });
    rosterTab = bad[0].college;
    renderRosterPreview();
    bad.forEach(function (b) {
      const tr = document.querySelector('[data-roster-row="' + b.i + '"]');
      if (tr) tr.style.background = 'var(--color-danger-bg)';
    });
    showToast('班名不合法（已標紅）：' + order.map(function (k) { return rosterTabLabel(k) + ' ' + byCollege[k] + ' 列'; }).join('、') +
      '，請修正後再匯入', 'error');
    return;
  }
  if (!selected.length) { showToast('未勾選任何列', 'error'); return; }
  try {
    await withBtnPending(btn, async function () {
      const res = await proxyCall('adminImportRoster', { rows: selected });
      bootstrapData.colleges = res.colleges;
      bootstrapData.departments = res.departments;
      bootstrapData.tutorSystems = res.tutorSystems;
      bootstrapData.classes = res.classes;
      renderNav();
      if (res.errors && res.errors.length) {
        showToast('匯入完成：成功 ' + res.successCount + ' 列，失敗 ' + res.errors.length + ' 列（詳見下方）', 'info');
        const hasDisabledClassError = res.errors.some(function (er) { return /class disabled:/.test(er.error || ''); });
        $('roster-preview').innerHTML =
          '<div class="empty-hint" style="color:var(--color-danger);">失敗列：</div>' +
          '<ul>' + res.errors.map(function (er) { return '<li>第 ' + (er.row + 1) + ' 列：' + escapeHtml(er.error) + '</li>'; }).join('') + '</ul>' +
          (hasDisabledClassError ? '<p class="field-hint">「class disabled」＝該班級已畢業／已停用，匯入被拒絕（設計如此）。' +
            '如需補匯：先到「班級」頁籤編輯該班、勾選「啟用」並儲存，重新上傳匯入；完成後再取消勾選「啟用」還原狀態。</p>' : '');
      } else {
        showToast('匯入完成，成功 ' + res.successCount + ' 列', 'success');
        rosterRows = null;
        renderAdminRoster();
      }
    });
  } catch (err) {
    showToast('匯入失敗：' + err.message, 'error');
  }
});
</script>
